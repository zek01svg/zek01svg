steps:
  # ── Build dashboard image ────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-dashboard
    args:
      - build
      - -f
      - Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/dashboard:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/dashboard:latest
      - .

  # ── Build workers image ──────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-workers
    args:
      - build
      - -f
      - Dockerfile.workers
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/workers:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/workers:latest
      - .

  # ── Push images ──────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-dashboard
    waitFor: [build-dashboard]
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/dashboard"]

  - name: gcr.io/cloud-builders/docker
    id: push-workers
    waitFor: [build-workers]
    args: [push, --all-tags, "${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/workers"]

  # ── Deploy dashboard to Cloud Run ────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-dashboard
    waitFor: [push-dashboard]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hq-dashboard
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/dashboard:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-secrets=NEXT_PUBLIC_SUPABASE_URL=SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,DATABASE_URL=DATABASE_URL:latest

  # ── Deploy workers to Cloud Run ──────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-workers
    waitFor: [push-workers]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - hq-workers
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/workers:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --no-allow-unauthenticated
      - --port=8080
      - --memory=2Gi
      - --cpu=2
      - --min-instances=0
      - --max-instances=2
      - --timeout=600
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,TELEGRAM_CHAT_ID=TELEGRAM_CHAT_ID:latest,GMAIL_CREDS_PERSONAL=GMAIL_CREDS_PERSONAL:latest,GMAIL_CREDS_SCHOOL=GMAIL_CREDS_SCHOOL:latest,GOOGLE_CALENDAR_CREDS=GOOGLE_CALENDAR_CREDS:latest,OUTLOOK_TOKEN_JSON=OUTLOOK_TOKEN_JSON:latest,APPLE_ID=APPLE_ID:latest,APPLE_APP_PASSWORD=APPLE_APP_PASSWORD:latest,OPENWEATHER_API_KEY=OPENWEATHER_API_KEY:latest,EXCHANGERATE_API_KEY=EXCHANGERATE_API_KEY:latest,NOTION_TOKEN=NOTION_TOKEN:latest,NOTION_TASK_DB_IDS=NOTION_TASK_DB_IDS:latest,BIBLE_API_KEY=BIBLE_API_KEY:latest,GITHUB_TOKEN=GITHUB_TOKEN:latest

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/dashboard:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/hq/workers:${SHORT_SHA}

substitutions:
  _REGION: asia-southeast1   # Singapore region

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
